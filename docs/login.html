<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Docs</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #e3e5e7;
            background-image:
                radial-gradient(ellipse at 20% 50%, rgba(56, 109, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(139, 92, 246, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 50%);
            overflow: hidden;
        }

        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(13, 127, 242, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(60px, 60px);
            }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: rgba(25, 59, 105, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 48px 40px;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.03),
                0 20px 60px rgba(0, 0, 0, 0.5),
                0 0 80px rgba(56, 109, 255, 0.04);
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.96);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
        }

        .login-logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #386dff, #8b5cf6);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(56, 109, 255, 0.3);
        }

        .login-logo-icon svg {
            fill: #fff;
        }

        .login-logo-text {
            font-size: 24px;
            font-weight: 800;
            color: #f0f6fc;
            letter-spacing: -0.02em;
        }

        .login-heading {
            text-align: center;
            margin-bottom: 8px;
            font-size: 20px;
            font-weight: 700;
            color: #f0f6fc;
        }

        .login-subheading {
            text-align: center;
            font-size: 14px;
            color: #0b0d0e;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .github-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px 24px;
            background: #f0f6fc;
            color: #0d1117;
            border: none;
            border-radius: 12px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }

        .github-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(56, 109, 255, 0.1), rgba(139, 92, 246, 0.1));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .github-btn:hover::before {
            opacity: 1;
        }

        .github-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .github-btn:active {
            transform: translateY(0);
        }

        .github-btn svg {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0;
            color: #dddee0;
            font-size: 12px;
            font-weight: 500;




            flex: 1;
            height: 1px;
            background: hwb(0 100% 0%);
        }

        .info-box {
            background: rgba(56, 109, 255, 0.06);
            border: 1px solid rgba(56, 109, 255, 0.12);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }

        .info-box svg {
            flex-shrink: 0;
            margin-top: 1px;
            color: #386dff;
        }

        .info-box p {
            font-size: 13px;
            color: #111213;
            line-height: 1.55;
        }

        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #131416;
        }

        .login-footer a {
            color: #386dff;
            text-decoration: none;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        /* Loading state */
        .github-btn.loading {
            pointer-events: none;
            opacity: 0.7;
        }

        .github-btn.loading .btn-text {
            display: none;
        }

        .github-btn.loading .btn-loader {
            display: inline-block;
        }

        .btn-loader {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(13, 17, 23, 0.2);
            border-top-color: #0d1117;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Error toast */
        .error-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-80px);
            background: #da3633;
            color: #fff;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(218, 54, 51, 0.3);
            transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 100;
        }

        .error-toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>

<body>

    <div id="error-toast" class="error-toast"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="login-logo-icon">
                    <svg width="22" height="22" viewBox="0 0 24 24">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                        <polyline points="14 2 14 8 20 8" fill="none" stroke="#fff" stroke-width="2" />
                    </svg>
                </div>
                <span class="login-logo-text">Docs</span>
            </div>


            <p class="login-subheading">Sign in to access the official documentation portal</p>

            <div class="divider"></div>
            <button id="github-login-btn" class="github-btn" onclick="loginWithGitHub()">
                <svg viewBox="0 0 16 16">
                    <path
                        d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
                        fill="#0d1117" />
                </svg>
                <span class="btn-text">Continue with GitHub</span>
                <span class="btn-loader"></span>
            </button>



            <div class="info-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <line x1="12" y1="16" x2="12" y2="12" />
                    <line x1="12" y1="8" x2="12.01" y2="8" />
                </svg>
                <p>Only authorized users can access the document</p>
            </div>


        </div>
    </div>

    <script>
        var API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? 'http://localhost:3000'
            : 'https://document-docsify.onrender.com';

        // If already logged in, go straight to docs
        if (localStorage.getItem('gh_access_token')) {
            window.location.replace('/');
        }

        // Check for auth errors in URL
        (function checkErrors() {
            var params = new URLSearchParams(window.location.search);
            if (params.has('auth_error')) {
                var err = params.get('auth_error');
                var messages = {
                    'unauthorized': 'Access denied. You are not a collaborator on this repository. Contact the repo owner for access.',
                    'no_code': 'Authentication was cancelled. Please try again.',
                    'server_error': 'A server error occurred. Please try again later.',
                };
                showError(messages[err] || 'Login failed: ' + err + '. Please try again.');
                // Clean URL
                window.history.replaceState({}, '', window.location.pathname);
            }
        })();

        function loginWithGitHub() {
            var btn = document.getElementById('github-login-btn');
            btn.classList.add('loading');
            window.location.href = API_BASE + '/api/auth/login';
        }

        function showError(msg) {
            var toast = document.getElementById('error-toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(function () { toast.classList.remove('show'); }, 5000);
        }
    </script>
</body>

</html>
